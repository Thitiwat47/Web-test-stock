openapi: 3.0.3
info:
  title: Website E-commerce API
  version: 1.0.0
  description: >-
    RESTful API for a small e-commerce system demonstrating JWT authentication,
    RBAC authorization, idempotent order and payment processing, validation,
    caching, rate limiting, monitoring, and API versioning.

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /data:
    get:
      summary: Retrieve all stock data
      description: Retrieve a list of all stock items in the database.
      responses:
        '200':
          description: A list of stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    name:
                      type: string
                      example: "Apple Inc."
                    price:
                      type: number
                      format: float
                      example: 150.25
  /update:
    post:
      summary: Update stock data
      description: Update the price of a stock item.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string